<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Sign Language - 3D Avatar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 400px 1fr;
            overflow: hidden;
        }

        .sidebar {
            background: linear-gradient(180deg, #1f538d 0%, #14b8a6 100%);
            padding: 30px;
            color: white;
        }

        .logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .button-primary {
            background: #14b8a6;
            color: white;
        }

        .button-primary:hover {
            background: #0d9488;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(20,184,166,0.4);
        }

        .button-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .button-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
        }

        .main-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1f538d;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 16px;
        }

        .avatar-container {
            flex: 1;
            background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 600px;
        }

        #avatar-canvas {
            width: 100%;
            height: 500px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .avatar-info {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }

        .current-letter {
            font-size: 48px;
            font-weight: bold;
            color: #1f538d;
            margin-bottom: 10px;
        }

        .progress {
            font-size: 18px;
            color: #64748b;
        }

        .slider-container {
            margin-top: 15px;
        }

        .slider {
            width: 100%;
            margin-top: 10px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .recording {
            animation: pulse 1s infinite;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                border-radius: 20px 20px 0 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">🤟</div>
            <div class="title">Voice to Sign Language</div>
            
            <div class="input-section">
                <div class="label">Enter Text or Use Voice</div>
                <textarea id="textInput" placeholder="Type your message here..."></textarea>
            </div>

            <button class="button button-primary" id="recordBtn">
                🎤 Record Voice
            </button>

            <button class="button button-primary" id="translateBtn">
                ▶️ Start Animation
            </button>

            <button class="button button-secondary" id="stopBtn" disabled>
                ⏹️ Stop
            </button>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Animation Speed</span>
                    <span id="speedValue">1.0s</span>
                </div>
                <input type="range" class="slider" id="speedSlider" min="0.3" max="2.5" step="0.1" value="1.0">
            </div>

            <div class="status" id="status">
                Ready to translate
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>3D Animated Sign Language Avatar</h1>
                <p>Watch smooth, interactive sign language animations</p>
            </div>

            <div class="avatar-container">
                <canvas id="avatar-canvas"></canvas>
                
                <div class="avatar-info">
                    <div class="current-letter" id="currentLetter">Ready</div>
                    <div class="progress" id="progress"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        let scene, camera, renderer, avatar;
        let isAnimating = false;
        let animationSpeed = 1.0;

        // Initialize Three.js Scene
        function initScene() {
            const canvas = document.getElementById('avatar-canvas');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f9ff);

            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                antialias: true 
            });
            renderer.setSize(width, height);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Create Avatar
            createAvatar();

            // Animation loop
            animate();
        }

        function createAvatar() {
            const avatarGroup = new THREE.Group();

            // Head
            const headGeometry = new THREE.SphereGeometry(0.8, 32, 32);
            const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 2;
            avatarGroup.add(head);

            // Body
            const bodyGeometry = new THREE.CylinderGeometry(0.6, 0.8, 1.5, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0x4682b4 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.5;
            avatarGroup.add(body);

            // Arms (hands for signing)
            const armGeometry = new THREE.CylinderGeometry(0.15, 0.15, 1.2, 16);
            const armMaterial = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-1, 0.8, 0);
            leftArm.rotation.z = Math.PI / 4;
            avatarGroup.add(leftArm);

            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            rightArm.position.set(1, 0.8, 0);
            rightArm.rotation.z = -Math.PI / 4;
            avatarGroup.add(rightArm);

            // Hands
            const handGeometry = new THREE.SphereGeometry(0.25, 16, 16);
            const handMaterial = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            
            const leftHand = new THREE.Mesh(handGeometry, handMaterial);
            leftHand.position.set(-1.5, 0.2, 0);
            avatarGroup.add(leftHand);

            const rightHand = new THREE.Mesh(handGeometry, handMaterial);
            rightHand.position.set(1.5, 0.2, 0);
            avatarGroup.add(rightHand);

            avatar = avatarGroup;
            scene.add(avatar);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (avatar && !isAnimating) {
                avatar.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }

        // Sign language animation for each letter
        function animateLetter(letter, index, total) {
            return new Promise((resolve) => {
                updateUI(letter, index, total);
                
                // Animate avatar based on letter
                const duration = animationSpeed * 1000;
                const startTime = Date.now();
                
                function animateFrame() {
                    if (!isAnimating) {
                        resolve();
                        return;
                    }

                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    // Different animations for different letters
                    if (avatar) {
                        const letterCode = letter.charCodeAt(0) - 65; // A=0, B=1, etc.
                        const angle = (letterCode / 26) * Math.PI * 2;
                        
                        avatar.children[3].position.x = -1.5 + Math.sin(angle + progress * Math.PI * 2) * 0.3;
                        avatar.children[3].position.y = 0.2 + Math.cos(angle + progress * Math.PI * 2) * 0.3;
                        
                        avatar.children[4].position.x = 1.5 + Math.cos(angle + progress * Math.PI * 2) * 0.3;
                        avatar.children[4].position.y = 0.2 + Math.sin(angle + progress * Math.PI * 2) * 0.3;
                        
                        avatar.rotation.y = progress * Math.PI * 0.2;
                    }

                    if (progress < 1) {
                        requestAnimationFrame(animateFrame);
                    } else {
                        resolve();
                    }
                }
                
                animateFrame();
            });
        }

        async function translateText() {
            const text = document.getElementById('textInput').value.trim();
            
            if (!text) {
                updateStatus('⚠️ Please enter text first', 'warning');
                return;
            }

            try {
                updateStatus('🔄 Preparing animation...', 'info');
                document.getElementById('translateBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                isAnimating = true;

                const response = await fetch(`${API_URL}/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                
                for (let i = 0; i < data.signs.length; i++) {
                    if (!isAnimating) break;
                    
                    const sign = data.signs[i];
                    await animateLetter(sign.letter, i + 1, data.signs.length);
                    await sleep(100);
                }

                updateStatus('✅ Animation complete!', 'success');
                updateUI('Complete', 0, 0);
                
            } catch (error) {
                updateStatus('❌ Error: ' + error.message, 'error');
            } finally {
                isAnimating = false;
                document.getElementById('translateBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        async function recordVoice() {
            const btn = document.getElementById('recordBtn');
            btn.classList.add('recording');
            btn.textContent = '⏺️ Recording...';
            btn.disabled = true;
            updateStatus('🎤 Listening... Speak now!', 'info');

            try {
                const response = await fetch(`${API_URL}/speech-to-text`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('textInput').value = data.text;
                    updateStatus('✅ Recognized: ' + data.text, 'success');
                } else {
                    updateStatus('❌ ' + data.error, 'error');
                }
            } catch (error) {
                updateStatus('❌ Error: ' + error.message, 'error');
            } finally {
                btn.classList.remove('recording');
                btn.textContent = '🎤 Record Voice';
                btn.disabled = false;
            }
        }

        function stopAnimation() {
            isAnimating = false;
            updateStatus('⏹️ Stopped', 'info');
        }

        function updateUI(letter, current, total) {
            document.getElementById('currentLetter').textContent = letter;
            document.getElementById('progress').textContent = 
                total > 0 ? `${current} / ${total} letters` : '';
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.background = 
                type === 'error' ? 'rgba(239, 68, 68, 0.3)' :
                type === 'success' ? 'rgba(34, 197, 94, 0.3)' :
                type === 'warning' ? 'rgba(245, 158, 11, 0.3)' :
                'rgba(255,255,255,0.1)';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Event Listeners
        document.getElementById('translateBtn').addEventListener('click', translateText);
        document.getElementById('recordBtn').addEventListener('click', recordVoice);
        document.getElementById('stopBtn').addEventListener('click', stopAnimation);
        
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            animationSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = animationSpeed.toFixed(1) + 's';
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('avatar-canvas');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // Initialize on load
        window.addEventListener('load', initScene);
    </script>
</body>
</html>
